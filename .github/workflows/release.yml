name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Package dist
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          zip -r "sublens-${TAG}.zip" dist/
          echo "ASSET=sublens-${TAG}.zip" >> "$GITHUB_ENV"
          echo "TAG=${TAG}" >> "$GITHUB_ENV"

      - name: Create Draft Release
        run: |
          gh release create "$TAG" "$ASSET" \
            --draft \
            --title "$TAG" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
